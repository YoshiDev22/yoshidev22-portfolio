{{ define "main" }}

<section class="min-h-screen bg-[#f7f9fa] py-20">
    <div class="container mx-auto px-6">

        <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center capitalize">
            {{ .Title }}
        </h2>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">

            {{ range .Pages }}

            <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col h-full">
                <div class="p-6 flex flex-col h-full">

                    <p class="text-sm text-slate-500 mb-2">
                        {{ .Date.Format "2 January, 2006" }}
                    </p>

                    {{ if .Params.categories }}
                    <span class="inline-block bg-black text-white text-[10px] font-bold px-2 py-1 uppercase tracking-wider mb-3 w-fit">
                        {{ index .Params.categories 0 }}
                    </span>
                    {{ end }}

                    <h3 class="font-bold text-xl mb-2 text-slate-900">
                        {{ .Title }}
                    </h3>

                    <p class="text-slate-600 mb-4 flex-grow">
                        {{ .Summary | truncate 120 }}
                    </p>

                    <a href="{{ .RelPermalink }}" class="font-semibold text-blue-600 hover:text-blue-700 mt-auto">
                        Leer más &rarr;
                    </a>

                </div>
            </div>

            {{ end }}

        </div>
    </div>
</section>

{{ end }}
