<section id="contact" class="bg-slate-800 text-white py-20">
    <div class="container mx-auto px-6">
        <div class="text-center">
            <h2 class="text-3xl font-bold mb-4">Hablemos</h2>
            <p class="text-slate-300 max-w-2xl mx-auto mb-8">
                ¿Tienes una idea interesante o una oportunidad de colaboración? Completa el formulario y me pondré en contacto contigo.
            </p>
        </div>
        
        <form id="contact-form" class="max-w-xl mx-auto mt-12">
            <div class="mb-6">
                <label for="name" class="block text-slate-300 text-sm font-bold mb-2 text-left">Nombre</label>
                <input type="text" id="name" name="name" class="w-full bg-slate-700 text-white rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow duration-300" placeholder="Tu Nombre" required>
            </div>
            <div class="mb-6">
                <label for="email" class="block text-slate-300 text-sm font-bold mb-2 text-left">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="w-full bg-slate-700 text-white rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow duration-300" placeholder="tu@email.com" required>
            </div>
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <label for="message" class="block text-slate-300 text-sm font-bold text-left">Mensaje</label>
                    <button type="button" id="gemini-contact-btn" class="text-xs text-cyan-400 hover:text-cyan-300 flex items-center gap-1">
                        ✨ Sugerir borrador (IA)
                        <span class="loader hidden"></span>
                    </button>
                </div>
                <textarea id="message" name="message" rows="5" class="w-full bg-slate-700 text-white rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow duration-300" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>
            <div class="text-center">
                <button type="submit" class="bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-bold px-10 py-4 rounded-full hover:shadow-lg hover:opacity-90 transition-all transform hover:scale-105 inline-block w-full sm:w-auto">
                    Enviar Mensaje
                </button>
            </div>
        </form>
    </div>
</section>
